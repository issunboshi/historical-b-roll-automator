# fly.toml app configuration file generated for b-roll-finder on 2026-02-10T17:21:10Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'b-roll-finder'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  CORS_ORIGINS = '*'

[http_service]
  internal_port = 8001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[checks]
  [checks.health]
    port = 8001
    type = 'http'
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    path = '/health'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
